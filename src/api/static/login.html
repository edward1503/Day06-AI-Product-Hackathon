<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --dim: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { font-size: 1.8rem; color: var(--accent); }
        .logo p { color: var(--dim); font-size: 0.9rem; margin-top: 0.3rem; }

        .tabs {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 0.7rem; text-align: center;
            background: none; border: none; color: var(--dim);
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px; transition: all 0.2s;
            font-family: inherit;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab-btn:hover { color: var(--text); }

        .form-group { margin-bottom: 1rem; }
        label {
            display: block; font-size: 0.85rem; color: var(--dim);
            margin-bottom: 0.3rem; font-weight: 500;
        }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 0.7rem 0.9rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 0.95rem; outline: none; font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .submit-btn {
            width: 100%; padding: 0.75rem; margin-top: 0.5rem;
            background: var(--accent); color: #0f172a;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: opacity 0.2s; font-family: inherit;
        }
        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .error-msg {
            color: var(--danger); font-size: 0.85rem;
            margin-top: 0.75rem; text-align: center;
            min-height: 1.2em;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>🎓 AI Tutor</h1>
            <p>Hệ thống gia sư AI cho bài giảng</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">Đăng nhập</button>
            <div class="error-msg" id="loginError"></div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="regName">Tên hiển thị</label>
                <input type="text" id="regName" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Mật khẩu</label>
                <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
            </div>
            <button type="submit" class="submit-btn" id="regBtn">Tạo tài khoản</button>
            <div class="error-msg" id="regError"></div>
        </form>
    </div>

    <script>
        // Check if already logged in
        fetch('/api/auth/me').then(r => {
            if (r.ok) window.location.href = '/';
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('loginError').textContent = '';
            document.getElementById('regError').textContent = '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            btn.disabled = true;
            errEl.textContent = '';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    errEl.textContent = data.detail || 'Đăng nhập thất bại';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errEl.textContent = 'Lỗi kết nối server';
            }
            btn.disabled = false;
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errEl = document.getElementById('regError');
            btn.disabled = true;
            errEl.textContent = '';

            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    errEl.textContent = data.detail || 'Đăng ký thất bại';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errEl.textContent = 'Lỗi kết nối server';
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
